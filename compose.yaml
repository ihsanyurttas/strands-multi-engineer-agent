name: strands-multi-engineer-agent

services:

  # --------------------------------------------------------------------------
  # agent — the Python CLI application
  #
  # Intended usage: docker compose run --rm agent <command>
  # Examples:
  #   docker compose run --rm agent doctor
  #   docker compose run --rm agent list-tasks
  #   docker compose run --rm agent run --provider ollama
  #
  # depends_on is intentionally omitted: the agent supports multiple providers
  # and should not be forced to wait for Ollama when using Anthropic or OpenAI.
  # Start Ollama first when needed: docker compose up ollama -d
  # --------------------------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # When running in Compose, Ollama is reachable via its service name.
      # This overrides any OLLAMA_BASE_URL set in .env (e.g. localhost).
      OLLAMA_BASE_URL: http://ollama:11434
      AGENT_RUNTIME: docker
    volumes:
      # eval/results is writable so run output persists on the host.
      - ./eval/results:/app/eval/results
      # sample_repos is writable: the implement phase writes generated patches
      # here via patch_writer.py. Changes are visible on the host after the run.
      - ./sample_repos:/app/sample_repos

  # --------------------------------------------------------------------------
  # ollama — local model server
  #
  # Only needed when DEFAULT_PROVIDER=ollama.
  # Pull a model before first use:
  #   docker compose exec ollama ollama pull llama3
  #
  # Healthcheck uses curl against /api/tags (not /): the /api/tags endpoint
  # confirms the server is initialised and ready to serve models, not just
  # that the process started. curl is available in the official ollama image.
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # GPU support — uncomment if the NVIDIA container runtime is available.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-models:
    driver: local
